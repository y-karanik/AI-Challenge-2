name: Deploy Task 1 to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "task-1/**"
      - ".github/workflows/task1-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "task1-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: task-1

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
