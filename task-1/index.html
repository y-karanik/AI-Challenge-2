<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header fade-up" style="--delay: 0ms">
        <h1>Leaderboard</h1>
        <p>Top performers based on contributions and activity</p>
      </header>

      <section class="filters-card fade-up" style="--delay: 70ms" aria-label="Filters">
        <div class="filter-group">
          <label class="sr-only" for="yearFilter">Year</label>
          <select id="yearFilter" class="filter-select">
            <option value="all">All Years</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="sr-only" for="quarterFilter">Quarter</label>
          <select id="quarterFilter" class="filter-select">
            <option value="all">All Quarters</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="sr-only" for="categoryFilter">Category</label>
          <select id="categoryFilter" class="filter-select">
            <option value="all">All Categories</option>
          </select>
        </div>
        <div class="search-wrap">
          <label class="sr-only" for="searchInput">Search employee</label>
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"></circle>
            <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Search employee..." />
        </div>
      </section>

      <section class="podium-wrap fade-up" style="--delay: 120ms" aria-label="Top performers">
        <div id="podium" class="podium-grid"></div>
      </section>

      <section class="rows-wrap fade-up" style="--delay: 180ms" aria-label="Leaderboard rows">
        <div id="leaderboardList" class="rows-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
